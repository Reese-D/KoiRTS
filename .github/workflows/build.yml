name: Build

on: [push, pull_request]

jobs:
  linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            meson \
            ninja-build \
            pkg-config \
            libgl1-mesa-dev \
            libopenal-dev \
            libx11-dev \
            libxext-dev \
            libxfixes-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libxrandr-dev

      - name: Configure
        run: meson setup build

      - name: Build
        run: meson compile -C build

  windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-meson
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-toolchain

      - name: Configure
        shell: msys2 {0}
        run: meson setup build

      - name: Build
        shell: msys2 {0}
        run: meson compile -C build
