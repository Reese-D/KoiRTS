name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  linux:
    runs-on: ubuntu-latest
    env:
      CARP_DIR: ${{ github.workspace }}/subprojects/Carp

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: haskell-actions/setup@v2
        with:
          enable-stack: true
          stack-version: latest

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            meson \
            ninja-build \
            pkg-config \
            libgl1-mesa-dev \
            libopenal-dev \
            libx11-dev \
            libxext-dev \
            libxfixes-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libxrandr-dev

      - name: Build Carp
        working-directory: subprojects/Carp
        run: stack build

      - name: Configure
        run: meson setup build

      - name: Build
        run: meson compile -C build

      - name: Package artifact
        run: tar -czf KoiRTS-${{ github.ref_name }}-linux.tar.gz -C build KoiRTS

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: KoiRTS-${{ github.ref_name }}-linux
          path: KoiRTS-${{ github.ref_name }}-linux.tar.gz

  macos:
    runs-on: macos-latest
    env:
      CARP_DIR: ${{ github.workspace }}/subprojects/Carp

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: haskell-actions/setup@v2
        with:
          enable-stack: true
          stack-version: latest

      - name: Install build dependencies
        run: brew install cmake meson ninja pkg-config

      - name: Build Carp
        working-directory: subprojects/Carp
        run: stack build

      - name: Configure
        run: meson setup build

      - name: Build
        run: meson compile -C build

      - name: Package artifact
        run: tar -czf KoiRTS-${{ github.ref_name }}-macos.tar.gz -C build KoiRTS

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: KoiRTS-${{ github.ref_name }}-macos
          path: KoiRTS-${{ github.ref_name }}-macos.tar.gz

  windows:
    runs-on: windows-latest
    env:
      CARP_DIR: ${{ github.workspace }}/subprojects/Carp

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install build dependencies
        run: python -m pip install --upgrade pip meson ninja

      - name: Install Scoop
        shell: powershell
        run: |
          iwr -useb get.scoop.sh -outfile 'install-scoop.ps1'
          ./install-scoop.ps1 -RunAsAdmin
          echo "$env:USERPROFILE\scoop\shims" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "C:\ProgramData\scoop\shims" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Stack
        shell: powershell
        run: scoop install stack

      - name: Build Carp
        working-directory: subprojects/Carp
        run: stack build

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure
        run: meson setup build

      - name: Build
        run: meson compile -C build

      - name: Package artifact
        shell: powershell
        run: Compress-Archive -Path build\KoiRTS.exe -DestinationPath KoiRTS-${{ github.ref_name }}-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: KoiRTS-${{ github.ref_name }}-windows
          path: KoiRTS-${{ github.ref_name }}-windows.zip

  publish:
    needs: [linux, macos, windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: KoiRTS-${{ github.ref_name }}-linux
          path: releases

      - name: Download MacOS artifact
        uses: actions/download-artifact@v4
        with:
          name: KoiRTS-${{ github.ref_name }}-macos
          path: releases

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: KoiRTS-${{ github.ref_name }}-windows
          path: releases

      - name: Publish release
        uses: ncipollo/release-action@v1
        with:
          artifacts: releases/*
          allowUpdates: true
          artifactErrorsFailBuild: true
          replacesArtifacts: true
          removeArtifacts: true
          tag: ${{ github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
